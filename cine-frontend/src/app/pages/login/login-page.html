<style>
	.error-msg {
		min-height: 1.5em;
		display: block;
		color: red;
	}

	.go-home {
		background-color: white;
		position: absolute;
		top: 0;
		left: 0;
		padding: 3px;
		margin: 3px;
		border-radius: 3px;
		text-decoration: none;
		color: black;
	}
</style>

<head>
	<title>Login V1</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<!--===============================================================================================-->
	<!-- <link rel="stylesheet" type="text/css" href="fonts/font-awesome-4.7.0/css/font-awesome.min.css"> -->
	<!--===============================================================================================-->
	<link rel="stylesheet" type="text/css" href="css/main.css">
	<!--===============================================================================================-->
</head>

<div class="limiter">
	<div class="container-login100">
		<a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="go-home">Volver a
			inicio</a>
		<div class="wrap-login100">
			<div class="login100-pic js-tilt" data-tilt>
				<img src="images/img-01.png" alt="IMG">
			</div>

			<form class="login100-form validate-form" (submit)="authAdmin(); $event.preventDefault()">
				<span class="login100-form-title">
					Admin Login
				</span>

				<div class="wrap-input100 validate-input" data-validate="Valid email is required: ex@abc.xyz">
					<input class="input100" type="text" name="user" placeholder="Username" [value]="userValue()"
						(input)="updateUsernameValue($event)">
					<span class="focus-input100"></span>
					<span class="symbol-input100">
						<i class="fa fa-user" aria-hidden="true"></i>

						<fa-icon [icon]="userIcon"></fa-icon>
					</span>
				</div>
				
				<div class="wrap-input100 validate-input" data-validate="Password is required">
					<input class="input100" type="password" name="pass" placeholder="Password" [value]="passwordValue()"
					(input)="updatePasswordValue($event)">
					<span class="focus-input100"></span>
					<span class="symbol-input100">
						<i class="fa fa-lock" aria-hidden="true"></i>
						<fa-icon [icon]="lockIcon"></fa-icon>
					</span>
				</div>

				<div class="container-login100-form-btn">
					<button type="submit" class="login100-form-btn" [disabled]="!userValue() || !passwordValue()">
						Login
					</button>
				</div>
				<p class="text-center error-msg">
					{{ loginSuccess() === false ? 'Usuario o Contraseña incorrectos' : '\u00A0' }}
				</p>

				<!-- <div class="text-center p-t-12">
						<span class="txt1">
							Forgot
						</span>
						<a class="txt2" href="#">
							Username / Password?
						</a>
					</div>

					<div class="text-center p-t-136">
						<a class="txt2" href="#">
							Create your Account
							<i class="fa fa-long-arrow-right m-l-5" aria-hidden="true"></i>
						</a>
					</div> -->
			</form>
		</div>
	</div>
</div>
